name: Ten Workflow
on: [push]
    

jobs:
  run-first-command:
    runs-on: ubuntu-latest
    steps:
      - name: Contexts and Expressions
        id: context-expression
        run: | 
            cat << 'EOF'
            ${{ toJson(github) }}
            ${{ toJson(runner) }}
            ${{ toJson(job) }}
            ${{ toJson(steps) }}
            EOF
